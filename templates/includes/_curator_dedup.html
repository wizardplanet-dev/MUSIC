{# Duplicate-review panel — hidden until "Find duplicates" is clicked. Shared between both curator pages. #}
<section id="curator-dedup-panel" class="curator-dedup-panel hidden">
    <div class="curator-dedup-header">
        <h3 id="curator-dedup-title">Duplicates Found</h3>
        <div class="curator-dedup-actions">
            <button type="button" id="curator-dedup-removeall" class="curator-btn" data-kind="danger" data-size="sm">Remove All Marked</button>
            <button type="button" id="curator-dedup-close" class="curator-dedup-close" title="Close">×</button>
        </div>
    </div>
    <div id="curator-dedup-groups"></div>
</section>
